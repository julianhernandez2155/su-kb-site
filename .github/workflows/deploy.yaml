name: Deploy site to GitHub Pages

# Builds the public KB with the thin Python renderer (ADR-0002) and deploys
# site/_site to GitHub Pages. Renderer: tools/render.py reads site/content/.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install renderer dependencies
        run: pip install markdown-it-py mdit-py-plugins pygments jinja2 pyyaml

      - name: Render site
        run: python tools/render.py

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
